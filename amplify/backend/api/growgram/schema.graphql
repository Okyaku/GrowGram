# --- 追加：AIロードマップ生成用定義 ---

input AIRoadmapInput {
  goal: String!
  deadline: String!
  currentLevel: String!
  weeklyHours: String!
  deliverable: String!
  learningStyle: String!
  setbacks: String!
}

type AIRoadmapTask {
  title: String!
  description: String!
}

type AIRoadmapMilestone {
  title: String!
  description: String!
  tasks: [AIRoadmapTask!]!
}

type AIRoadmapResult {
  goal: String!
  milestones: [AIRoadmapMilestone!]!
}

type Query {
  generateRoadmapWithAI(input: AIRoadmapInput!): AIRoadmapResult
}
