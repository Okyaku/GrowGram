# --- 既存の全モデル（提供された最新版を完全維持） ---

type Post
  @model
  @auth(
    rules: [
      { allow: owner, operations: [create, read, update, delete] }
      { allow: private, operations: [read] }
    ]
  ) {
  id: ID!
  content: String!
  title: String
  tags: [String]
  imageKey: String
  imageKeys: [String]
  isArchived: Boolean
  passion: Int
  logic: Int
  routine: Int
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

